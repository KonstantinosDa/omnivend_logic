<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniVend Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar {
            min-height: 100vh;
            background-color: #212529;
            color: white;
            box-shadow: 4px 0 10px rgba(0,0,0,0.1);
        }
        .nav-link { 
            color: #adb5bd; 
            padding: 12px 20px;
            border-radius: 8px;
            margin: 4px 0;
        }
        .nav-link:hover, .nav-link.active { 
            color: white; 
            background-color: #343a40;
        }
        .main-content { padding: 40px; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-none d-md-block sidebar">
                <div class="position-sticky pt-4 px-3">
                    <h4 class="text-info fw-bold mb-4">OmniVend AI</h4>
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link active" href="{% url 'dashboard' %}">📊 Overview</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">📍 Machines</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">🍿 Products</a>
                        </li>
                        <hr class="text-secondary">
                        <li class="nav-item">
                            <a class="nav-link text-danger" href="/admin/logout/">Logout</a>
                        </li>
                    </ul>
                </div>
            </nav>

            <main class="col-md-10 main-content">
                {% block content %}
                {% endblock %}
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
